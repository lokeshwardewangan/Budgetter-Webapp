# Single-server nginx config for the Budgetter SPA.
# Two responsibilities:
#   1. Serve the built Vite bundle from /usr/share/nginx/html with SPA fallback.
#   2. Reverse-proxy /api/* to the Node backend on the shared docker network.
#
# The upstream uses the compose service name "server" — DNS is resolved by
# the docker bridge network, so there's no hardcoded localhost between containers.

upstream budgetter_api {
    # `server` is the compose service name; 5000 is the backend's internal port.
    server server:5000;
    keepalive 16;
}

server {
    listen      80;
    server_name _;

    # ----- Static assets -----------------------------------------------------
    root  /usr/share/nginx/html;
    index index.html;

    # Gzip text assets — Vite already produces hashed filenames so caching is safe.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain text/css text/xml application/json application/javascript
        application/xml+rss application/atom+xml image/svg+xml;

    # Long cache for hashed build assets; HTML stays uncached so deploys roll out.
    location /assets/ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ----- API reverse proxy -------------------------------------------------
    # Anything under /api/ goes to the backend. Path is preserved (no rewrite),
    # because the express app already mounts routes at /api/user, /api/user/report.
    location /api/ {
        proxy_pass         http://budgetter_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ----- SPA fallback ------------------------------------------------------
    # Anything else falls through to index.html so client-side routing works.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Basic hardening
    server_tokens off;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
}
